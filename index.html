<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Destiny Tales</title>
  <meta name="robots" content="noindex, nofollow">
  <script>
    (function () {

      const savedLang = localStorage.getItem('dt_lang');

      // если язык уже выбран — используем его
      if (savedLang) {
        location.replace('/' + savedLang + '/');
        return;
      }

      const lang = (navigator.language || '').toLowerCase();

      // RU и похожие
      const ruLangs = ['ru','uk','be','kk','uz','ky','tg','tk','hy','az','ka','mo'];

      for (let i = 0; i < ruLangs.length; i++) {
        if (lang.startsWith(ruLangs[i])) {
          location.replace('/ru/');
          return;
        }
      }

      // всё остальное → EN
      location.replace('/en/');

    })();
  </script>
</head>
<body></body>
</html>
